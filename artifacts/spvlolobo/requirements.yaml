packages:
  "framer-motion": "For complex page transitions, scroll animations, and floating decorative elements"
  "embla-carousel-react": "For smooth, accessible image carousels on the detail pages"
  "lucide-react": "For beautiful UI icons"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For merging tailwind classes safely"

images:
